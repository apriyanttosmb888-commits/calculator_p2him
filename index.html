<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>DOCT Dashboard Calculator</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    background:#0f172a;
    color:white;
    padding:25px;
}

.dashboard{
    max-width:1200px;
    margin:auto;
}

.header{
    margin-bottom:25px;
}

.header h1{
    font-size:32px;
    font-weight:700;
}

.header p{
    color:#94a3b8;
    margin-top:5px;
}

.grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(300px,1fr));
    gap:20px;
}

.card{
    background:#1e293b;
    border-radius:20px;
    padding:25px;
    box-shadow:0 0 15px rgba(0,0,0,0.3);
}

.card h2{
    font-size:20px;
    margin-bottom:20px;
    color:#38bdf8;
}

.input-group{
    margin-bottom:18px;
}

.input-group label{
    display:block;
    margin-bottom:8px;
    font-size:14px;
    color:#cbd5e1;
}

.input-group input{
    width:100%;
    padding:13px;
    border:none;
    border-radius:12px;
    background:#334155;
    color:white;
    font-size:16px;
}

.input-group input:focus{
    outline:none;
    border:2px solid #38bdf8;
}

.result-box{
    margin-top:20px;
    padding:20px;
    border-radius:15px;
    background:#0f172a;
    text-align:center;
}

.result-box h3{
    color:#94a3b8;
    font-size:15px;
    margin-bottom:10px;
}

.result{
    font-size:30px;
    font-weight:700;
    color:#22c55e;
}

.table-box{
    overflow-x:auto;
}

table{
    width:100%;
    border-collapse:collapse;
}

table th{
    background:#0f172a;
    padding:14px;
    color:#38bdf8;
}

table td{
    padding:14px;
    border-bottom:1px solid #334155;
}

.badge{
    background:#22c55e;
    color:white;
    padding:5px 12px;
    border-radius:20px;
    font-size:12px;
}

@media(max-width:768px){

.header h1{
    font-size:24px;
}

.result{
    font-size:24px;
}

}

</style>
</head>

<body>

<div class="dashboard">

    <div class="header">
        <h1>🔥 DOCT Dashboard Calculator</h1>
        <p>Monitoring saldo & kalkulasi otomatis</p>
    </div>

    <div class="grid">

        <!-- CARD INPUT -->
        <div class="card">

            <h2>Kalkulasi Saldo DOCT</h2>

            <div class="input-group">
                <label>Total Saldo DOCT</label>
                <input type="number" id="totalSaldo" value="0">
            </div>

            <div class="input-group">
                <label>Cut Off</label>
                <input type="number" id="cutoff" value="0">
            </div>

            <div class="input-group">
                <label>Daylee Fee</label>
                <input type="number" id="daylee" value="0">
            </div>

            <div class="input-group">
                <label>Approved Tanggal Semalam</label>
                <input type="number" id="approvedSemalam" value="0">
            </div>

            <div class="input-group">
                <label>Approved Hari Ini</label>
                <input type="number" id="approvedHariIni" value="0">
            </div>

            <div class="input-group">
                <label>Unsettle</label>
                <input type="number" id="unsettle" value="0">
            </div>

            <div class="result-box">
                <h3>HASIL AKHIR</h3>
                <div class="result" id="hasil">
                    Rp 0
                </div>
            </div>

        </div>

        <!-- CARD TABLE -->
        <div class="card">

            <h2>Keterangan Saldo</h2>

            <div class="table-box">

                <table>

                    <thead>
                        <tr>
                            <th>Keterangan</th>
                            <th>Nominal</th>
                        </tr>
                    </thead>

                    <tbody>

                        <tr>
                            <td>Total Saldo DOCT</td>
                            <td id="tbSaldo">Rp 0</td>
                        </tr>

                        <tr>
                            <td>Cut Off</td>
                            <td id="tbCutoff">Rp 0</td>
                        </tr>

                        <tr>
                            <td>Daylee Fee</td>
                            <td id="tbDaylee">Rp 0</td>
                        </tr>

                        <tr>
                            <td>Approved Semalam</td>
                            <td id="tbSemalam">Rp 0</td>
                        </tr>

                        <tr>
                            <td>Approved Hari Ini</td>
                            <td id="tbHariIni">Rp 0</td>
                        </tr>

                        <tr>
                            <td>Unsettle</td>
                            <td id="tbUnsettle">Rp 0</td>
                        </tr>

                        <tr>
                            <td><strong>Hasil Akhir</strong></td>
                            <td>
                                <span class="badge" id="tbHasil">
                                    Rp 0
                                </span>
                            </td>
                        </tr>

                    </tbody>

                </table>

            </div>

        </div>

    </div>

</div>

<script>

const inputs = document.querySelectorAll("input");

inputs.forEach(input => {
    input.addEventListener("input", hitungSaldo);
});

function formatRupiah(angka){
    return "Rp " + Number(angka).toLocaleString("id-ID");
}

function hitungSaldo(){

    let totalSaldo = parseFloat(document.getElementById("totalSaldo").value) || 0;
    let cutoff = parseFloat(document.getElementById("cutoff").value) || 0;
    let daylee = parseFloat(document.getElementById("daylee").value) || 0;
    let approvedSemalam = parseFloat(document.getElementById("approvedSemalam").value) || 0;
    let approvedHariIni = parseFloat(document.getElementById("approvedHariIni").value) || 0;
    let unsettle = parseFloat(document.getElementById("unsettle").value) || 0;

    let hasil =
        totalSaldo -
        (
            cutoff +
            daylee +
            approvedSemalam +
            approvedHariIni +
            unsettle
        );

    document.getElementById("hasil").innerText = formatRupiah(hasil);

    document.getElementById("tbSaldo").innerText = formatRupiah(totalSaldo);
    document.getElementById("tbCutoff").innerText = formatRupiah(cutoff);
    document.getElementById("tbDaylee").innerText = formatRupiah(daylee);
    document.getElementById("tbSemalam").innerText = formatRupiah(approvedSemalam);
    document.getElementById("tbHariIni").innerText = formatRupiah(approvedHariIni);
    document.getElementById("tbUnsettle").innerText = formatRupiah(unsettle);
    document.getElementById("tbHasil").innerText = formatRupiah(hasil);

}

hitungSaldo();

</script>

</body>
</html>
